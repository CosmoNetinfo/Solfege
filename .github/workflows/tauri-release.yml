name: Tauri Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          # Estrae il blocco relativo al tag corrente dal CHANGELOG.md
          # Cerca dalla riga "## <tag>" fino alla riga "## " successiva (esclusa)
          NOTES=$(awk "/^## ${TAG}$/,/^## /" CHANGELOG.md | grep -v "^## ${TAG}$" | grep -v "^## " | sed '/^[[:space:]]*$/d' | head -50)
          if [ -z "$NOTES" ]; then
            NOTES="Vedi CHANGELOG.md per i dettagli di questa versione."
          fi
          # Salva su file per evitare problemi con caratteri speciali
          echo "$NOTES" > release_notes.txt
          echo "notes_file=release_notes.txt" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (draft)
        id: create-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const tag = context.ref.replace('refs/tags/', '')
            let body = ''
            try {
              body = fs.readFileSync('release_notes.txt', 'utf8').trim()
            } catch (e) {
              body = 'Vedi CHANGELOG.md per i dettagli di questa versione.'
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Solfège ${tag}`,
              body: body,
              draft: true,
              prerelease: false
            })
            return data.id

  build-tauri:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
         include:
           - os: windows-latest
             target: x86_64-pc-windows-msvc
           - os: macos-latest
             target: x86_64-apple-darwin
           - os: macos-latest
             target: aarch64-apple-darwin
           - os: ubuntu-22.04
             target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: solfege/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'solfege/src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend dependencies
        working-directory: solfege
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: https://tqpcoeahucwvtpkihgqi.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxcGNvZWFodWN3dnRwa2loZ3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTQ5MjgsImV4cCI6MjA5NDE5MDkyOH0.yRPK9wmy0YUK_ivxILFsUf9uzA3JZUn5yo3DpnRxjL8
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxcGNvZWFodWN3dnRwa2loZ3FpIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODYxNDkyOCwiZXhwIjoyMDk0MTkwOTI4fQ.llehwjzPHAkuS9X2njKYIt5LfkHCExClDgYMbRGnpEw
        with:
          projectPath: solfege
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = "${{ needs.create-release.outputs.release_id }}"
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false
            })

      - name: Notify Vercel API and Update Supabase
        run: |
          TAG="${{ github.ref_name }}"
          # Rimuove la "v" iniziale se presente (es. v1.1.4 -> 1.1.4)
          VERSION="${TAG#v}"
          
          # Costruisce note di rilascio
          NOTES="Aggiornamento automatico della versione $VERSION."
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## ${TAG}$/,/^## /" CHANGELOG.md | grep -v "^## ${TAG}$" | grep -v "^## " | sed '/^[[:space:]]*$/d' | head -30)
            if [ -z "$NOTES" ]; then
              NOTES="Miglioramenti generali e ottimizzazioni in $TAG."
            fi
          fi
          
          # Costruisce URL dei download usando gli asset ufficiali di release di GitHub
          # Sostituisci owner/repo con il nome effettivo se necessario
          WIN_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Solfege_${VERSION}_x64-setup.exe"
          MAC_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Solfege_${VERSION}_x64.dmg"
          LIN_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Solfege_${VERSION}_amd64.AppImage"
          
          # Esegue chiamata API sicura per impostare la versione corrente
          curl -X POST https://solfege-five.vercel.app/api/superadmin/publish-release \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.API_PUBLISH_SECRET }}" \
            -d "{
              \"version\": \"$VERSION\",
              \"release_notes\": \"$NOTES\",
              \"windows_url\": \"$WIN_URL\",
              \"mac_url\": \"$MAC_URL\",
              \"linux_url\": \"$LIN_URL\",
              \"is_current\": true
            }"

